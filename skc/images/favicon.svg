<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3f76"/>
      <stop offset="100%" stop-color="#0b1c3a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4dd93"/>
      <stop offset="50%" stop-color="#d79a1f"/>
      <stop offset="100%" stop-color="#b87817"/>
    </linearGradient>
  </defs>

  <!-- laurel wreaths -->
  <g fill="url(#gold)">
    <g id="leaf-l">
      <ellipse cx="26" cy="70" rx="10" ry="4.5" transform="rotate(-20 26 70)"/>
      <ellipse cx="22" cy="86" rx="10" ry="4.5" transform="rotate(-8 22 86)"/>
      <ellipse cx="20" cy="103" rx="10" ry="4.5" transform="rotate(4 20 103)"/>
      <ellipse cx="21" cy="120" rx="10" ry="4.5" transform="rotate(16 21 120)"/>
      <ellipse cx="25" cy="136" rx="10" ry="4.5" transform="rotate(28 25 136)"/>
      <ellipse cx="32" cy="150" rx="9" ry="4" transform="rotate(40 32 150)"/>
      <path d="M18 62 C14 100 16 135 34 158" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    </g>
    <use href="#leaf-l" transform="translate(200,0) scale(-1,1)"/>
  </g>

  <!-- shield -->
  <path d="M100 10 L165 32 V95 C165 138 138 170 100 185 C62 170 35 138 35 95 V32 Z" fill="url(#shield)" stroke="url(#gold)" stroke-width="3"/>
  <path d="M100 18 L157 37 V95 C157 133 133 161 100 175 C67 161 43 133 43 95 V37 Z" fill="none" stroke="#f4dd93" stroke-width="1" opacity="0.5"/>

  <!-- crown -->
  <g fill="url(#gold)">
    <path d="M76 34 L82 20 L91 30 L100 16 L109 30 L118 20 L124 34 Z"/>
    <circle cx="82" cy="20" r="3.2"/>
    <circle cx="100" cy="16" r="3.6"/>
    <circle cx="118" cy="20" r="3.2"/>
    <rect x="76" y="33" width="48" height="5" rx="1.5"/>
  </g>

  <!-- star -->
  <path fill="url(#gold)" d="M100 42 l2.6 6.2 6.7 0.5 -5.1 4.4 1.6 6.6 -5.8-3.6 -5.8 3.6 1.6-6.6 -5.1-4.4 6.7-0.5z"/>

  <!-- rays -->
  <g stroke="url(#gold)" stroke-width="1.6" opacity="0.85">
    <line x1="100" y1="62" x2="100" y2="80"/>
    <line x1="88" y1="66" x2="92" y2="82"/>
    <line x1="112" y1="66" x2="108" y2="82"/>
    <line x1="78" y1="74" x2="86" y2="86"/>
    <line x1="122" y1="74" x2="114" y2="86"/>
  </g>

  <!-- open book -->
  <path d="M63 90 C78 84 90 86 100 92 C110 86 122 84 137 90 V112 C122 106 110 108 100 114 C90 108 78 106 63 112 Z" fill="#ffffff"/>
  <path d="M100 92 V114" stroke="#c9d3e0" stroke-width="1.2"/>
  <path d="M68 94 L94 100 M68 100 L94 105 M68 106 L92 110" stroke="#9aa8bd" stroke-width="1"/>
  <path d="M132 94 L106 100 M132 100 L106 105 M132 106 L108 110" stroke="#9aa8bd" stroke-width="1"/>

  <!-- circuit traces -->
  <g fill="none" stroke="url(#gold)" stroke-width="1.6">
    <path d="M63 112 L54 120 L54 128"/>
    <path d="M75 116 L68 124 L68 132"/>
    <path d="M137 112 L146 120 L146 128"/>
    <path d="M125 116 L132 124 L132 132"/>
  </g>
  <g fill="url(#gold)">
    <circle cx="54" cy="128" r="2.4"/>
    <circle cx="68" cy="132" r="2.4"/>
    <circle cx="146" cy="128" r="2.4"/>
    <circle cx="132" cy="132" r="2.4"/>
  </g>

  <!-- SKC + year -->
  <text x="100" y="146" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">SKC</text>
  <text x="100" y="160" font-family="Arial, sans-serif" font-size="8" font-weight="700" letter-spacing="1" fill="url(#gold)" text-anchor="middle">ESE 2026</text>
</svg>
